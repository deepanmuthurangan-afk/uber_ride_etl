# The main pipeline for uber_ride_etl_pipeline

resources:
  pipelines:
    uber_ride_etl_pipeline_etl:
      name: uber_ride_etl_pipeline_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/uber_ride_etl_pipeline_etl"

      libraries:
        - glob:
            include: ../src/uber_ride_etl_pipeline_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
