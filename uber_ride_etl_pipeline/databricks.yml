# This is a Databricks asset bundle definition for uber_ride_etl_pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: uber_ride_etl_pipeline
  uuid: 8ec3a159-2f73-4aba-b3cc-6469acf2b171

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-83de7e87-81b5.cloud.databricks.com
    variables:
      catalog: uber
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-83de7e87-81b5.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/ddeepan007mv@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/ddeepan007mv@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: uber
      schema: prod
    permissions:
      - user_name: ddeepan007mv@gmail.com
        level: CAN_MANAGE
